services:
  - type: web
    name: deku-service
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_EXTERNAL_URL
        value: https://deku-service.onrender.com
    healthCheckPath: /health
    autoDeploy: true
